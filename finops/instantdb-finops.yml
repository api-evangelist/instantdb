specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: InstantDB
providerId: instantdb
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- Database
- Realtime
- Sync
- Backend
- Local First
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of InstantDB spend. Instant bills a flat monthly subscription
  per plan (Free $0, Pro $30, Startup $600, Enterprise custom) with included
  database storage allotments and storage overage at $0.125 per GB beyond the
  plan ceiling. API requests are unlimited, so the principal variable cost
  driver is database storage growth and the chosen plan tier / seat count.
notes: >-
  Subscription prices and storage overage rates are subject to change; verify
  against the InstantDB pricing page during reconciliation.
sources:
- https://www.instantdb.com/pricing
- https://www.instantdb.com/docs
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: InstantDB
serviceCategory: Databases
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: InstantDB
  ServiceCategory: Databases
  ProviderName: InstantDB
  PublisherName: InstantDB
  InvoiceIssuerName: InstantDB
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription-Based
meters:
- name: plan_subscription
  description: Flat monthly plan fee (Free / Pro / Startup / Enterprise).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: database_storage_gb
  description: Database space used, against the plan's included storage allotment.
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
  - app
- name: storage_overage_gb
  description: Database storage beyond the plan allotment, billed at $0.125 per GB.
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - app
- name: team_seats
  description: Team members per app, capped by plan (1 Free / 10 Pro / unlimited Startup).
  unit: seats
  aggregation: max
  dimensions:
  - account
  - app
- name: api_requests
  description: Admin HTTP API and realtime sync requests (unlimited / not metered for billing).
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - app
principles:
- name: Visibility
  description: Track database storage growth per app against the plan allotment to anticipate overage.
- name: Allocation
  description: Map apps and team seats to internal cost centers; tag admin tokens per workload.
- name: Optimization
  description: Right-size the plan tier to seats and storage; prune unused $files storage to avoid $0.125/GB overage.
- name: Accountability
  description: Assign an owner per app; review the monthly subscription and storage overage against budget.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
